[general]
default_action = "translate_ptbr"
log_level = "info"

[capture]
# auto detecta portal, GNOME Shell D-Bus, gnome-screenshot, grim ou maim conforme a sessao.
backend = "auto"
prefer_portal = true
capture_timeout_ms = 30000

[infer]
backend = "ollama"
base_url = "http://127.0.0.1:11434"
model = "gemma4:e2b"
ocr_model = "gemma4:e2b"
embedding_model = ""
keep_alive = "15m"
temperature = 0.1
thinking_default = ""
context_window_tokens = 8192

[providers]
route_mode = "local_first"
sensitive_data_mode = "local_only"
ollama_enabled = true
cloud_enabled = false

[search]
enabled = true
base_url = "https://www.google.com/search"
fallback_enabled = true
fallback_base_url = "https://html.duckduckgo.com/html/"
request_timeout_ms = 10000
max_results = 3
open_browser = true
rendered_ai_overview_listener = true
rendered_ai_overview_wait_ms = 12000
rendered_ai_overview_poll_interval_ms = 3000

[audio]
enabled = true
backend = "piper_http"
base_url = "http://127.0.0.1:5000"
default_voice = ""
speak_actions = ["TranslatePtBr", "Explain", "SearchWeb", "OpenApplication", "OpenUrl", "OpenDocument"]
player_command = "pw-play"
request_timeout_ms = 60000
playback_timeout_ms = 120000

[audio.voices]
"pt-BR" = "pt_BR-faber-medium"

[voice]
enabled = true
backend = "auto"
target = ""
overlay_enabled = true
shortcut = "<Super>F12"
record_duration_ms = 4000
sample_rate_hz = 16000
channels = 1
record_command = ""
transcribe_command = "venv/bin/python tools/stt/faster_whisper_transcribe.py {wav_path} --model base --language auto --beam-size 5 --vad-filter true --cache-dir tools/stt-cache"
transcribe_timeout_ms = 120000

[documents]
enabled = true
chunk_chars = 3200
chunk_overlap_chars = 320
cache_translations = true
cache_audio = true

[ui]
overlay = "compact"
show_notification = true
