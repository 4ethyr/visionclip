[general]
default_action = "translate_ptbr"
log_level = "info"

[capture]
# auto detecta portal, GNOME Shell D-Bus, gnome-screenshot, grim ou maim conforme a sessao.
backend = "auto"
prefer_portal = true
capture_timeout_ms = 30000

[infer]
backend = "ollama"
base_url = "http://127.0.0.1:11434"
model = "gemma4:e2b"
ocr_model = "gemma4:e2b"
embedding_model = ""
keep_alive = "15m"
temperature = 0.1
thinking_default = ""
context_window_tokens = 8192

[providers]
# O daemon registra somente Ollama nesta fase. Cloud fica desligado por padrao.
route_mode = "local_first"
sensitive_data_mode = "local_only"
ollama_enabled = true
cloud_enabled = false

[search]
enabled = true
base_url = "https://www.google.com/search"
fallback_enabled = true
fallback_base_url = "https://html.duckduckgo.com/html/"
request_timeout_ms = 10000
max_results = 3
open_browser = true
rendered_ai_overview_listener = true
rendered_ai_overview_wait_ms = 12000
rendered_ai_overview_poll_interval_ms = 3000
index_on_startup = true
watch_enabled = true
debounce_ms = 800
max_file_size_mb = 64
max_text_bytes = 4000000
max_workers = 2
content_index = true
semantic_index = false
ocr_index = false
vector_backend = "sqlite_vec"
roots = ["/usr/share/applications", "/var/lib/flatpak/exports/share/applications", "~/.local/share/applications", "~/.local/share/flatpak/exports/share/applications", "~/Documents", "~/Downloads", "~/Desktop", "~/Pictures", "~/Projects", "~/dev"]
exclude_dirs = [".git", "node_modules", "target", "vendor", ".venv", "venv", "__pycache__", ".hg", ".svn", "dist", "build", ".cache", ".local/share/Trash"]
exclude_sensitive_dirs = ["~/.ssh", "~/.gnupg", "~/.local/share/keyrings", "~/.password-store", "~/.aws", "~/.azure", "~/.kube", "~/.docker", "~/.mozilla", "~/.config/google-chrome", "~/.config/chromium", "~/.config/BraveSoftware", "~/.config/Signal", "~/.config/discord", "~/.cache", "~/.local/share/Trash"]
exclude_globs = [".env", ".env.*", "*.pem", "*.key", "*.p12", "*.pfx", "id_rsa", "id_ed25519", "*credentials*", "*secret*", "*token*", "*password*", "*.sqlite", "*.db"]

[search.ranking]
prefer_filename_for_short_queries = true
recency_boost = true
frecency_boost = true
hybrid_fusion = "rrf"

[audio]
enabled = true
backend = "piper_http"
base_url = "http://127.0.0.1:5000"
default_voice = ""
speak_actions = ["TranslatePtBr", "Explain", "SearchWeb", "OpenApplication", "OpenUrl"]
player_command = "pw-play"
request_timeout_ms = 60000
playback_timeout_ms = 120000

[audio.voices]
# Configure vozes Piper instaladas em tools/piper-voices para pronuncia natural por idioma.
# O servidor Piper precisa iniciar com --data-dir/--download-dir apontando para esse diretorio.
"pt-BR" = "dii_pt-BR"
# en = "en_US-lessac-medium"
# es = "es_ES-sharvard-medium"
# zh = "zh_CN-huayan-medium"
# ru = "ru_RU-ruslan-medium"
# hi = "hi_IN-pratham-medium"
# ja/ko ficam em branco ate haver voz Piper compativel instalada ou outro provider TTS.

[voice]
enabled = false
wake_word_enabled = false
wake_block_during_playback = true
speaker_verification_enabled = false
speaker_verification_threshold = 0.72
speaker_verification_min_samples = 3
backend = "auto"
target = ""
overlay_enabled = false
shortcut = "<Super>space"
record_duration_ms = 4000
wake_record_duration_ms = 3200
wake_idle_sleep_ms = 250
sample_rate_hz = 16000
channels = 1
record_command = ""
# O comando de transcricao deve escrever o texto no stdout ou em {transcript_path}.
# Placeholders: {wav_path}, {transcript_path}, {duration_ms}, {duration_s}, {sample_rate_hz}, {channels}
transcribe_command = "venv/bin/python tools/stt/faster_whisper_transcribe.py {wav_path} --model base --language auto --beam-size 5 --vad-filter true --cache-dir tools/stt-cache"
transcribe_timeout_ms = 60000

[documents]
enabled = true
chunk_chars = 3200
chunk_overlap_chars = 320
cache_translations = true
cache_audio = true

[ui]
overlay = "panel"
show_notification = true

[ui.search_overlay]
enabled = true
shortcut = "<Alt>space"
liquid_glass_enabled = true
glass_style = "liquid_crystal"
blur_radius_px = 32
panel_opacity = 0.04
corner_radius_px = 28
border_opacity = 0.30
shadow_intensity = 0.28
highlight_intensity = 0.42
saturation = 1.18
contrast = 1.06
brightness = 1.00
refraction_strength = 0.86
chromatic_aberration = 0.28
liquid_noise = 0.52
background = "#16111b"
surface = "#110c15"
text_primary = "#ffffff"
text_secondary = "#e0e6ed"
primary = "#3b82f6"
secondary = "#0053db"
ai_glow = "#2fd9f4"
error = "#ffb4ab"
animations_enabled = true
