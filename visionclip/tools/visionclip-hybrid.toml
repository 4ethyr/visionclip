[general]
default_action = "translate_ptbr"
log_level = "info"

[capture]
backend = "auto"
prefer_portal = true
capture_timeout_ms = 30000

[infer]
backend = "ollama"
base_url = "http://127.0.0.1:11434"
model = "gemma4:e2b"
ocr_model = "gemma4:e2b"
keep_alive = "15m"
temperature = 0.1
thinking_default = ""

[search]
enabled = true
base_url = "https://www.google.com/search"
fallback_enabled = true
fallback_base_url = "https://html.duckduckgo.com/html/"
request_timeout_ms = 10000
max_results = 3
open_browser = true

[audio]
enabled = true
backend = "piper_http"
base_url = "http://127.0.0.1:5000"
default_voice = ""
speak_actions = ["TranslatePtBr", "Explain", "SearchWeb"]
player_command = "pw-play"

[voice]
enabled = true
backend = "auto"
target = "alsa_input.pci-0000_00_1f.3-platform-skl_hda_dsp_generic.HiFi__Mic1__source"
overlay_enabled = true
shortcut = "<Super>F12"
record_duration_ms = 4000
sample_rate_hz = 16000
channels = 1
record_command = ""
transcribe_command = "/home/aethyr/Documents/visionclip/visionclip/venv/bin/python /home/aethyr/Documents/visionclip/visionclip/tools/stt/faster_whisper_transcribe.py {wav_path} --model base --language pt --cache-dir /home/aethyr/Documents/visionclip/visionclip/tools/stt-cache"
transcribe_timeout_ms = 120000

[ui]
overlay = "compact"
show_notification = true
